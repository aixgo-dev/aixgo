apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aixgo

resources:
- namespace.yaml
- rbac.yaml
- secrets.yaml
- ollama-deployment.yaml
- aixgo-deployment.yaml
- mcp-server-deployment.yaml
- ingress.yaml

configMapGenerator:
- name: aixgo-config
  literals:
  - environment=production
  - log_level=info
  - ollama_url=http://ollama-service:11434
  - mcp_server_url=mcp-server-service:9090
  - max_rounds=10
  - agent_timeout=300
  - enable_tracing=true
  - enable_metrics=true
  - metrics_port=8080
  options:
    disableNameSuffixHash: true

labels:
- pairs:
    app.kubernetes.io/name: aixgo
    app.kubernetes.io/managed-by: kustomize
  includeSelectors: true

images:
- name: REGION-docker.pkg.dev/PROJECT_ID/aixgo/orchestrator
  newTag: latest
- name: REGION-docker.pkg.dev/PROJECT_ID/aixgo/mcp-server
  newTag: latest
