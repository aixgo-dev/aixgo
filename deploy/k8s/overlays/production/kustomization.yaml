apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aixgo

resources:
- ../../base

patches:
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: aixgo-orchestrator
- path: mcp-server-patch.yaml
  target:
    kind: Deployment
    name: mcp-server

configMapGenerator:
- name: aixgo-config
  behavior: merge
  literals:
  - environment=production
  - log_level=info

replicas:
- name: aixgo-orchestrator
  count: 3
- name: mcp-server
  count: 5
- name: ollama
  count: 2

images:
- name: REGION-docker.pkg.dev/PROJECT_ID/aixgo/orchestrator
  newTag: v1.0.0
- name: REGION-docker.pkg.dev/PROJECT_ID/aixgo/mcp-server
  newTag: v1.0.0
