# GoReleaser workflow for automated binary releases
# Triggers on version tags (v*) and creates GitHub releases
#
# Binary: aixgo (agent orchestrator CLI)
# Platforms: Linux, macOS, Windows (amd64, arm64)
#
# References:
#   - https://goreleaser.com/ci/actions/
#   - https://github.com/goreleaser/goreleaser-action

name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create GitHub release and upload assets
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify Go modules
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test -race -short ./...

      - name: Install Syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    name: Verify ${{ matrix.os }}
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            archive: Linux_x86_64.tar.gz
            binary: aixgo
          - os: macos-latest
            archive: Darwin_arm64.tar.gz
            binary: aixgo
          - os: windows-latest
            archive: Windows_x86_64.zip
            binary: aixgo.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read  # download release artifacts
    steps:
      # SECURITY (Aikido #183): verify the release archive against the
      # SHA-256 checksum GoReleaser publishes alongside the archives
      # before extracting or executing anything, so a tampered artifact
      # can never be run as part of the verify step.
      - name: Download and verify (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          ARCHIVE="aixgo_${VERSION}_${{ matrix.archive }}"
          BASE="https://github.com/aixgo-dev/aixgo/releases/download/${TAG}"

          # Fetch archive + checksums file (checksums.txt is produced by
          # GoReleaser and covers every archive in the release).
          curl -fsSL -o "${ARCHIVE}" "${BASE}/${ARCHIVE}"
          curl -fsSL -o checksums.txt "${BASE}/checksums.txt"

          # Verify ONLY the archive we just downloaded. `sha256sum --ignore-missing`
          # lets us reuse the full checksums.txt without failing on
          # platform-specific entries we didn't download.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum --ignore-missing -c checksums.txt
          else
            # macOS: shasum -a 256 doesn't support --ignore-missing, so filter first.
            grep " ${ARCHIVE}\$" checksums.txt | shasum -a 256 -c -
          fi

          tar xzf "${ARCHIVE}"
          chmod +x ${{ matrix.binary }}
          # Verify binary executes and shows usage (exits non-zero without config, but that's expected)
          ./${{ matrix.binary }} -h 2>&1 | grep -q "Usage" && echo "Binary verified successfully"

      - name: Download and verify (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $archive = "aixgo_${version}_${{ matrix.archive }}"
          $base = "https://github.com/aixgo-dev/aixgo/releases/download/${tag}"

          # SECURITY (Aikido #183): verify SHA-256 checksum before extraction.
          Invoke-WebRequest -Uri "$base/$archive" -OutFile $archive
          Invoke-WebRequest -Uri "$base/checksums.txt" -OutFile checksums.txt

          $expectedLine = (Get-Content checksums.txt | Where-Object { $_ -match "\s$([regex]::Escape($archive))$" })
          if (-not $expectedLine) { throw "no checksum entry for $archive in checksums.txt" }
          $expected = ($expectedLine -split '\s+')[0].ToLower()
          $actual = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          if ($expected -ne $actual) { throw "checksum mismatch for $archive: expected $expected, got $actual" }
          Write-Host "Checksum verified for $archive"

          Expand-Archive -Path $archive -DestinationPath .
          # Verify binary executes and shows usage
          $output = & ".\${{ matrix.binary }}" -h 2>&1 | Out-String
          if ($output -match "Usage") { Write-Host "Binary verified successfully" } else { exit 1 }
