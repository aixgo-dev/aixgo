name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'web/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'web/**'

env:
  # Minimum Go patch release — matches the `toolchain` directive in go.mod
  # and picks up stdlib CVE fixes that our govulncheck CI guard will flag.
  GO_VERSION: '1.26.2'

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
      with:
        version: latest
        args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.2']
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -o bin/aixgo-linux-amd64 .
        CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -v -o bin/aixgo-darwin-amd64 .
        CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -v -o bin/aixgo-darwin-arm64 .
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -v -o bin/aixgo-windows-amd64.exe .

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries
        path: bin/
        retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Build Aixgo image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
      with:
        context: .
        file: ./docker/aixgo.Dockerfile
        push: false
        tags: aixgo/orchestrator:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Ollama image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
      with:
        context: .
        file: ./docker/ollama.Dockerfile
        push: false
        tags: aixgo/ollama:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        cache-dependency-path: go.sum

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Gosec Security Scanner
      uses: securego/gosec@223e19b8856e00f02cc67804499a83f77e208f3c # v2.25.0
      with:
        args: '-no-fail -exclude-dir=proto -fmt sarif -out gosec-results.sarif ./...'

    # Note: continue-on-error prevents SARIF format issues from failing the workflow.
    # Gosec still runs completely and findings are visible in workflow logs.
    - name: Upload Gosec results to GitHub Security
      id: upload-gosec-sarif
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
      continue-on-error: true
      with:
        sarif_file: 'gosec-results.sarif'
        category: 'gosec'

    - name: Warn on Gosec upload failure
      if: steps.upload-gosec-sarif.outcome == 'failure'
      run: |
        echo "::warning::Gosec SARIF upload failed. Security findings are still available in the workflow logs above."

    # govulncheck guards against dependency vulnerabilities across the main
    # module and every example module. This was added after GHSA-xxxx (see
    # issue #145) to ensure a regression in google.golang.org/grpc or any
    # other vulnerable dep cannot silently land. The job fails if any
    # module reports a known vulnerability.
    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck (main module)
      run: govulncheck ./...

    - name: Run govulncheck (example modules)
      run: |
        set -e
        failed=0
        for mod in examples/*/go.mod; do
          dir=$(dirname "$mod")
          echo "::group::govulncheck $dir"
          if ! (cd "$dir" && govulncheck ./...); then
            failed=1
          fi
          echo "::endgroup::"
        done
        exit $failed

    # kube-linter guards the security posture of the Kubernetes manifests.
    # Lints the base and both rendered overlays (staging + production) so
    # operator-facing manifest drift is caught early.
    #
    # This was added after issues #129 and #130 to prevent a regression in
    # the securityContext or NET_RAW capability drop from silently landing.
    - name: Set up kubectl
      uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

    - name: Install kube-linter
      run: go install golang.stackrox.io/kube-linter/cmd/kube-linter@latest

    - name: Lint Kubernetes manifests (base + overlays)
      run: |
        set -e
        for target in deploy/k8s/base deploy/k8s/overlays/staging deploy/k8s/overlays/production; do
          echo "::group::kube-linter $target"
          kubectl kustomize "$target" | kube-linter --config .kube-linter.yaml lint -
          echo "::endgroup::"
        done
