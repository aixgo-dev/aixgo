name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'web/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'web/**'

env:
  GO_VERSION: '1.26'

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -o bin/aixgo-linux-amd64 .
        CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -v -o bin/aixgo-darwin-amd64 .
        CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -v -o bin/aixgo-darwin-arm64 .
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -v -o bin/aixgo-windows-amd64.exe .

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: binaries
        path: bin/
        retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Aixgo image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/aixgo.Dockerfile
        push: false
        tags: aixgo/orchestrator:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Ollama image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./docker/ollama.Dockerfile
        push: false
        tags: aixgo/ollama:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        cache-dependency-path: go.sum

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Gosec Security Scanner
      uses: securego/gosec@v2.25.0
      with:
        args: '-no-fail -exclude-dir=proto -fmt sarif -out gosec-results.sarif ./...'

    # Note: continue-on-error prevents SARIF format issues from failing the workflow.
    # Gosec still runs completely and findings are visible in workflow logs.
    - name: Upload Gosec results to GitHub Security
      id: upload-gosec-sarif
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: 'gosec-results.sarif'
        category: 'gosec'

    - name: Warn on Gosec upload failure
      if: steps.upload-gosec-sarif.outcome == 'failure'
      run: |
        echo "::warning::Gosec SARIF upload failed. Security findings are still available in the workflow logs above."

    # govulncheck guards against dependency vulnerabilities across the main
    # module and every example module. This was added after GHSA-xxxx (see
    # issue #145) to ensure a regression in google.golang.org/grpc or any
    # other vulnerable dep cannot silently land. The job fails if any
    # module reports a known vulnerability.
    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck (main module)
      run: govulncheck ./...

    - name: Run govulncheck (example modules)
      run: |
        set -e
        failed=0
        for mod in examples/*/go.mod; do
          dir=$(dirname "$mod")
          echo "::group::govulncheck $dir"
          if ! (cd "$dir" && govulncheck ./...); then
            failed=1
          fi
          echo "::endgroup::"
        done
        exit $failed

    # kube-linter guards the security posture of the Kubernetes manifests.
    # We lint the rendered BASE kustomization here (not the overlays) because
    # the base is where the hardening actually lives: runAsNonRoot,
    # readOnlyRootFilesystem, allowPrivilegeEscalation=false,
    # capabilities.drop: [ALL], seccompProfile=RuntimeDefault. The staging
    # and production overlays currently have a pre-existing kustomize
    # generator bug tracked separately; once the overlays render cleanly
    # this step should be expanded to lint the full rendered overlays so
    # operator-facing manifest drift is also caught.
    #
    # This was added after issues #129 and #130 to prevent a regression in
    # the securityContext or NET_RAW capability drop from silently landing.
    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Install kube-linter
      run: go install golang.stackrox.io/kube-linter/cmd/kube-linter@latest

    - name: Lint base Kubernetes manifests
      run: |
        set -e
        echo "::group::kube-linter deploy/k8s/base"
        kubectl kustomize deploy/k8s/base | kube-linter lint -
        echo "::endgroup::"
